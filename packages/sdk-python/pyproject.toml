[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agenteconomy"
version = "0.1.0"
description = "Python SDK for BotBrained.ai on Cardano — AgentWallet + BountyClient"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
  "pycardano>=0.11.0",
  "aiohttp>=3.9.0",
  "cbor2>=5.6.0",
]

[project.optional-dependencies]
langchain = ["langchain-core>=0.2.0"]
crewai = ["crewai>=0.28.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "aioresponses>=0.7"]

[tool.hatch.build.targets.wheel]
packages = ["agenteconomy"]
